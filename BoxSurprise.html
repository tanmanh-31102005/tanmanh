<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quà bất ngờ</title>
  <style>
    :root{
      --bg:#ffd6e6;
      --pink:#ff77b0;
      --accent:#ff2d95;
      --box:#f7c1e0;
      --box-dark:#d88ab2;
      --gold: #ffd86b;
      --glass: rgba(255,255,255,0.25);
    }
    html,body{height:100%;}
    body{
      margin:0;
      font-family: 'Segoe UI', Roboto, system-ui, Arial; 
      background: radial-gradient( circle at 10% 10%, #ffe6f0 0%, var(--bg) 20%, #ffd0e8 40%), linear-gradient(180deg, #ffd6e6 0%, #ffb7d9 100%);
      display:flex;align-items:center;justify-content:center;overflow:hidden;
    }
    /* floating hearts background */
    .hearts{
      position:absolute;inset:0;pointer-events:none;z-index:0;opacity:0.65;
      background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.25), transparent),
                        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.15), transparent);
    }
    .heart{position:absolute;width:40px;height:40px;background:transparent;transform:rotate(-45deg);}
    .heart:before,.heart:after{content:'';position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.18);} 
    .heart:before{top:-20px;left:0}
    .heart:after{left:20px;top:0}
    /* create several hearts */
    .heart.h1{left:10%;top:15%;transform:scale(1.2) rotate(-45deg);animation:float1 8s linear infinite}
    .heart.h2{left:70%;top:10%;transform:scale(.9) rotate(-45deg);animation:float2 9s linear infinite}
    .heart.h3{left:40%;top:70%;transform:scale(.8) rotate(-45deg);animation:float3 7s linear infinite}
    .heart.h4{left:85%;top:55%;transform:scale(.6) rotate(-45deg);animation:float1 10s linear infinite}
    @keyframes float1{0%{transform:translateY(0) rotate(-45deg)}50%{transform:translateY(-20px) rotate(-45deg)}100%{transform:translateY(0) rotate(-45deg)}}
    @keyframes float2{0%{transform:translateY(0) rotate(-45deg)}50%{transform:translateY(-30px) rotate(-45deg)}100%{transform:translateY(0) rotate(-45deg)}}
    @keyframes float3{0%{transform:translateY(0) rotate(-45deg)}50%{transform:translateY(-12px) rotate(-45deg)}100%{transform:translateY(0) rotate(-45deg)}}

    /* main stage */
    .stage{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}

    /* gift */
    .gift-wrap{position:relative;width:260px;height:220px;display:flex;align-items:center;justify-content:center;}
    .box-body{
      position:relative;width:220px;height:140px;background:linear-gradient(180deg,var(--box) 0%, var(--box-dark) 100%);
      border-radius:12px;box-shadow:0 18px 30px rgba(215,70,130,0.25), inset 0 -6px 18px rgba(255,255,255,0.12);
      transform-origin:50% 0%;
    }
    .box-lid{
      position:absolute;left:50%;top:-28px;width:240px;height:70px;background:linear-gradient(180deg, #ffd9f0 0%, #ff9fd3 100%);
      border-radius:10px;transform-origin:50% 85%;transform:translateX(-50%) rotateX(0deg);
      box-shadow:0 18px 25px rgba(200,30,100,0.18);
    }
    /* ribbon */
    .ribbon-vert{position:absolute;left:50%;top:0;width:18px;height:220px;background:linear-gradient(180deg,#ff6aa6,#ff2d95);transform:translateX(-50%);border-radius:6px;z-index:2}
    .ribbon-hor{position:absolute;top:38%;left:12px;right:12px;height:18px;background:linear-gradient(90deg,#ff6aa6,#ff2d95);border-radius:6px;z-index:2}
    .bow{position:absolute;left:50%;top:4px;transform:translateX(-50%);z-index:3}
    .bow .loop{display:inline-block;width:34px;height:34px;background:linear-gradient(90deg,#ffe6a8,#ffb2d0);border-radius:50%;box-shadow:0 6px 12px rgba(0,0,0,0.12);margin:0 6px}

    /* sparkle overlay */
    .sparkles{position:absolute;inset:-30px;pointer-events:none;z-index:4}
    .sparkle{position:absolute;width:8px;height:8px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px rgba(255,215,120,0.9);opacity:0.9;transform:scale(0.8);animation:twinkle 1.6s linear infinite}
    .sparkle.s1{left:20%;top:10%;animation-delay:0s}
    .sparkle.s2{left:35%;top:40%;animation-delay:.2s}
    .sparkle.s3{left:60%;top:20%;animation-delay:.4s}
    .sparkle.s4{left:75%;top:55%;animation-delay:.6s}
    .sparkle.s5{left:48%;top:5%;animation-delay:.9s}
    @keyframes twinkle{0%{opacity:0.1;transform:scale(0.6)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0.1;transform:scale(0.6)}}

    /* text panel */
    .text-area{position:absolute;top:50%;left:50%;transform:translate(-50%,-10%);text-align:center;z-index:5;color:#fff;pointer-events:none;min-width:260px}
    .line{opacity:0;transform:translateY(8px) scale(0.98);transition:all .6s cubic-bezier(.2,.9,.2,1);}
    .big{font-size:20px;font-weight:800;text-shadow:0 6px 18px rgba(0,0,0,0.18);}
    .small{font-size:14px;margin-top:6px;opacity:0.95}
    .show{opacity:1;transform:translateY(0) scale(1)}
    .fade-scale{transition:all .6s cubic-bezier(.2,.9,.2,1);}

n    /* single-line message style */
    
    .single{font-size:18px;font-weight:700;color:#fff;text-shadow:0 8px 22px rgba(200,30,120,0.28);opacity:0;transform:translateY(10px) scale(.98);transition:all .6s cubic-bezier(.2,.9,.2,1)}
    .single.show{opacity:1;transform:translateY(0) scale(1)}

    /* countdown */
    .countdown{position:absolute;top:52%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:900;color:#fff;text-shadow:0 10px 30px rgba(0,0,0,0.4);opacity:0;transition:all .3s linear;z-index:6}
    .countdown.show{opacity:1}

    /* lid open state */
    .open .box-lid{transform:translateX(-50%) rotateX(65deg);transition:transform .9s cubic-bezier(.2,.9,.2,1)}
    .closed .box-lid{transform:translateX(-50%) rotateX(0deg);transition:transform .6s cubic-bezier(.2,.9,.2,1)}

    /* subtle breathing */
    .gift-wrap{animation:breath 6s ease-in-out infinite}
    @keyframes breath{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

    /* responsive */
    @media (max-width:420px){.gift-wrap{transform:scale(.85)}.single{font-size:20px}.big{font-size:18px}}
  </style>
</head>
<body>
  <audio id="bgMusic" controls loop>
    <source src="https://dl.dropbox.com/s/e93f5kxsmtankf3/Best%20Time.mp3" type="audio/mpeg">
  </audio>
  <style>
    audio { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; }
    #audioStatus { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); 
                  background: rgba(255,255,255,0.9); padding: 5px 15px; border-radius: 15px;
                  font-size: 12px; color: #ff6aa6; display: none; }
  </style>
  <div id="audioStatus">Click vào trang web để phát nhạc ❤️</div>
  <div class="hearts">
    <div class="heart h1"></div>
    <div class="heart h2"></div>
    <div class="heart h3"></div>
    <div class="heart h4"></div>
  </div>
  <div class="stage">
    <div class="gift-wrap closed" id="gift">
      <div class="ribbon-vert"></div>
      <div class="ribbon-hor"></div>
      <div class="box-body"></div>
      <div class="box-lid"></div>
      <div class="bow">
        <span class="loop"></span>
        <span class="loop"></span>
      </div>
      <div class="sparkles">
        <div class="sparkle s1"></div>
        <div class="sparkle s2"></div>
        <div class="sparkle s3"></div>
        <div class="sparkle s4"></div>
        <div class="sparkle s5"></div>
      </div>
      <div class="text-area">
        <div class="line big" id="line1">Chị làm em pé của e mãi mãi nhoo</div>
        <div class="line small" id="line2">Món quà nho nhỏ cho chị bé nè</div>
        <div class="single" id="single">Yêu chị nhiều lắm luôn á!</div>
      <div class="countdown" id="count">3</div>
    </div>
  </div>
  <script>
    // Sequence timings (ms)
    const phaseDelay = 2500;
    const gift = document.getElementById('gift');
    const line1 = document.getElementById('line1');
    const line2 = document.getElementById('line2');
    const single = document.getElementById('single');
    const countEl = document.getElementById('count');
    const bgMusic = document.getElementById('bgMusic');

    // Autoplay music when user interacts with the page
    document.addEventListener('click', function startMusic() {
      bgMusic.play().catch(e => console.log('Music autoplay prevented'));
      document.removeEventListener('click', startMusic);
    });

    function wait(ms){return new Promise(res=>setTimeout(res,ms));}

    async function runCycle(){
      // start closed, sparkle visible by default. show closed for phaseDelay
      gift.classList.remove('open');
      gift.classList.add('closed');
      // ensure texts hidden
      hideAllText();
      await wait(phaseDelay);

      // open lid and show two lines
      gift.classList.remove('closed');
      gift.classList.add('open');
      await wait(420); // wait for lid opening slight delay for better effect
      showLines();
      await wait(phaseDelay);

      // hide two lines, show single message
      hideLines();
      await wait(400);
      showSingle();
      await wait(phaseDelay);

      // hide single, start countdown and close lid after countdown
      hideSingle();
      await wait(300);
      await runCountdown(3, Math.floor(phaseDelay / 3));

      // close lid and reset quickly
      gift.classList.remove('open');
      gift.classList.add('closed');
      await wait(700);
    }

    function showLines(){
      line1.classList.add('show');
      line2.classList.add('show');
    }
    function hideLines(){
      line1.classList.remove('show');
      line2.classList.remove('show');
    }
    function showSingle(){ single.classList.add('show'); }
    function hideSingle(){ single.classList.remove('show'); }
    function hideAllText(){ line1.classList.remove('show'); line2.classList.remove('show'); single.classList.remove('show'); countEl.classList.remove('show'); }

    async function runCountdown(start, per){
      countEl.classList.add('show');
      for(let i=start;i>=1;i--){
        countEl.textContent = i;
        // pulse effect
        countEl.style.transform = 'translate(-50%,-50%) scale(1.08)';
        await wait(120);
        countEl.style.transform = 'translate(-50%,-50%) scale(1)';
        await wait(per-120);
      }
      countEl.classList.remove('show');
    }

    // Loop forever with small gap; use self-invoking async loop
    (async function loop(){
      // brief initial delay for dramatic entrance
      await wait(600);
      while(true){
        await runCycle();
      }
    })();

n    // Accessibility: allow click to toggle pause/resume for the viewer
    let paused=false;document.body.addEventListener('click',()=>{
      if(!paused){
        paused=true; // freeze by adding style override
        document.documentElement.style.setProperty('--paused','paused');
        // quick visual cue: reduce opacity of sparkles and text
        document.querySelectorAll('.sparkle').forEach(s=>s.style.animationPlayState='paused');
        document.querySelectorAll('.line, .single, .countdown').forEach(t=>t.style.transition='none');
      } else {
        paused=false; document.querySelectorAll('.sparkle').forEach(s=>s.style.animationPlayState='running');
        document.querySelectorAll('.line, .single, .countdown').forEach(t=>t.style.transition='all .6s cubic-bezier(.2,.9,.2,1)');
      }
    });
  </script>
</body>
</html>
